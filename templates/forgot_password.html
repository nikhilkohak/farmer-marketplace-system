<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Forgot Password</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

<style>
    body{
    font-family: 'Segoe UI', sans-serif;
    background: url("https://images.unsplash.com/photo-1500382017468-9049fed747ef?auto=format&fit=crop&w=1950&q=80") no-repeat center center fixed;
    background-size: cover;
    min-height: 100vh;
    padding: 20px;
}

</style>
</head>

<body class="bg-light">

<div class="container d-flex justify-content-center align-items-center vh-100">

    <div class="card shadow p-4" style="width: 100%; max-width: 400px; border-radius: 15px;">

        <form method="POST">

            <h3 class="text-center mb-4 text-success">
                <i class="fa fa-envelope"></i> Forgot Password
            </h3>

            <div class="mb-3">
                <input type="email" name="email" class="form-control rounded-pill" placeholder="Enter Email" required>
            </div>

            <div class="d-flex justify-content-between mb-3">
                <a href="{{ url_for('login') }}" class="text-decoration-none text-secondary">
                    <i class="fa fa-arrow-left"></i> Back
                </a>
            </div>

            <div class="d-grid">
                <button type="submit" class="btn btn-success rounded-pill">
                    <i class="fa fa-arrow-right"></i> Next
                </button>
            </div>

        </form>

    </div>

</div>

</body>
</html>
