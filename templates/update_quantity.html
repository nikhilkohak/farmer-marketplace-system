<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Update Crop Quantity</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            background: url("https://images.unsplash.com/photo-1500382017468-9049fed747ef?auto=format&fit=crop&w=1950&q=80") no-repeat center center fixed;
            background-size: cover;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .card-glass {
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(15px);
            border-radius: 15px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 8px 25px rgba(0,0,0,0.4);
            padding: 30px;
            width: 100%;
            max-width: 500px;
            color: #fff;
        }

        h2 {
            text-align: center;
            margin-bottom: 25px;
            color: #fff;
        }

        label {
            font-weight: bold;
            margin-top: 10px;
        }

        input {
            width: 100%;
            padding: 10px;
            border-radius: 8px;
            border: 1px solid #ccc;
            margin-bottom: 15px;
        }

        button {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 8px;
            background: #27ae60;
            color: white;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            background: #219150;
            transform: scale(1.03);
        }

        .back-link {
            display: block;
            text-align: center;
            margin-top: 15px;
        }

        .back-link a {
            text-decoration: none;
            color: #fff;
            background: #7f8c8d;
            padding: 10px 20px;
            border-radius: 8px;
            transition: 0.3s;
        }

        .back-link a:hover {
            background: #636e72;
        }
    </style>
</head>
<body>

<div class="card-glass">
    <h2><i class="fa fa-seedling"></i> Update Crop Quantity - {{ crop.crop_name }}</h2>

    <form method="POST">
        <div class="mb-3">
            <label>Quantity (Quintal)</label>
            <input type="text" name="quantity" value="{{ crop.quantity }}" required>
        </div>

        <div class="mb-3">
            <label>Selling Price (per 100kg)</label>
            <input type="text" name="selling_price" value="{{ crop.selling_price }}">
        </div>

        <button type="submit"><i class="fa fa-save"></i> Update</button>
    </form>

    <div class="back-link">
        <a href="{{ url_for('farmer_dashboard') }}"><i class="fa fa-arrow-left"></i> Back to Dashboard</a>
    </div>
</div>

</body>
</html>
