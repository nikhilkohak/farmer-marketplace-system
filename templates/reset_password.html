<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Reset Password</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<!-- Bootstrap 5 -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<!-- Font Awesome -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

<style>
   body{
    font-family: 'Segoe UI', sans-serif;
    background: url("https://images.unsplash.com/photo-1500382017468-9049fed747ef?auto=format&fit=crop&w=1950&q=80") no-repeat center center fixed;
    background-size: cover;
    min-height: 100vh;
    padding: 20px;
}



    .reset-card {
        background: white;
        margin-top: 200px;
        margin-left: 35%;
        padding: 30px;
        border-radius: 15px;
        width: 100%;
        max-width: 400px;
        box-shadow: 0 10px 25px rgba(0,0,0,0.2);
    }

    .reset-card h3 {
        text-align: center;
        margin-bottom: 20px;
        font-weight: bold;
        color: #2E7D32;
    }

    .form-control {
        border-radius: 10px;
    }

    .btn-custom {
        background-color: #4CAF50;
        color: white;
        border-radius: 10px;
    }

    .btn-custom:hover {
        background-color: #388E3C;
    }

    .back-link {
        text-decoration: none;
        color: #555;
    }

    .back-link:hover {
        color: #000;
    }
</style>
</head>

<body>

<div class="reset-card">

    <h3><i class="fa fa-lock"></i> Reset Password</h3>

    <form method="POST">

        <div class="mb-3">
            <input type="password" 
                   name="password" 
                   class="form-control" 
                   placeholder="Enter New Password" 
                   required>
        </div>

        <div class="d-flex justify-content-between align-items-center mb-3">
            <a href="{{ url_for('forgot_password') }}" class="back-link">
                <i class="fa fa-arrow-left"></i> Back
            </a>
        </div>

        <div class="d-grid">
            <button type="submit" class="btn btn-custom">
                <i class="fa fa-check"></i> Update Password
            </button>
        </div>

    </form>

</div>

</body>
</html>
