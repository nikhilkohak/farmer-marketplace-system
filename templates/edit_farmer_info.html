<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Edit Farmer Info</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            background: url("https://images.unsplash.com/photo-1500382017468-9049fed747ef?auto=format&fit=crop&w=1950&q=80") no-repeat center center fixed;
            background-size: cover;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .card-glass {
            background: rgba(255,255,255,0.15);
            backdrop-filter: blur(15px);
            border-radius: 15px;
            border: 1px solid rgba(255,255,255,0.2);
            box-shadow: 0 8px 25px rgba(0,0,0,0.4);
            padding: 30px;
            width: 100%;
            max-width: 500px;
            color: #fff;
        }

        h2 {
            text-align: center;
            margin-bottom: 25px;
            color: #fff;
        }

        .form-control {
            border-radius: 8px;
            margin-bottom: 15px;
            padding: 12px;
            font-size: 15px;
        }

        .btn-save {
            width: 100%;
            padding: 12px;
            border-radius: 8px;
            font-weight: bold;
        }

        .btn-back {
            display: block;
            margin-top: 20px;
            text-align: center;
            color: #fff;
            text-decoration: none;
        }

        .btn-back:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>

<div class="card-glass">

    <h2><i class="fa fa-user-edit"></i> Edit Your Information</h2>

    <form method="POST" action="{{ url_for('edit_farmer_info') }}">
      Name  <input type="text" name="name" class="form-control" placeholder="Name" 
               value="{{ name if farmer_info else '' }}" required>

       Contact No. <input type="text" name="contact_no" class="form-control" placeholder="Contact Number" 
               value="{{ farmer_info.contact_no if farmer_info else '' }}" required>

       Location <input type="text" name="location" class="form-control" placeholder="Location" 
               value="{{ farmer_info.location if farmer_info else '' }}" required>

        <button type="submit" class="btn btn-success btn-save"><i class="fa fa-save"></i> Save Changes</button>
    </form>

    <a href="{{ url_for('farmer_dashboard') }}" class="btn-back"><i class="fa fa-arrow-left"></i> Back to Dashboard</a>

</div>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
