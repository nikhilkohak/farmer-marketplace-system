<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Update Price</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<!-- Bootstrap 5 CSS -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
body {
    background: url("https://images.unsplash.com/photo-1500382017468-9049fed747ef?auto=format&fit=crop&w=1950&q=80") no-repeat center center fixed;
    background-size: cover;
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    font-family: 'Segoe UI', sans-serif;
    padding: 20px;
}

.card-glass {
    background: rgba(255,255,255,0.15);
    backdrop-filter: blur(15px);
    border-radius: 15px;
    border: 1px solid rgba(255,255,255,0.3);
    box-shadow: 0 10px 25px rgba(0,0,0,0.4);
    color: #fff;
}

.card-body {
    padding: 2rem;
}

h3 {
    color: #27ae60;
}

.form-control {
    border-radius: 8px;
    padding: 12px;
    font-size: 16px;
    background: rgba(255,255,255,0.9);
    color: #2c3e50;
}

.form-control:focus {
    border-color: #27ae60;
    box-shadow: 0 0 5px rgba(39,174,96,0.5);
}

.btn-success {
    border-radius: 8px;
    font-weight: bold;
}

.alert-light {
    background: rgba(255,255,255,0.2);
    border-radius: 8px;
}

a.btn-outline-secondary {
    border-radius: 8px;
    color: #fff;
    border: 1px solid rgba(255,255,255,0.6);
}

a.btn-outline-secondary:hover {
    background: rgba(255,255,255,0.2);
    color: #27ae60;
}
</style>
</head>

<body>

<div class="container">
  <div class="row justify-content-center">
    <div class="col-md-5">
      <div class="card card-glass shadow-lg border-0 rounded-4">
        <div class="card-body">

          <h3 class="text-center mb-4"  style="color:black;">
            <i class="fa fa-pencil-alt"></i>  Update Crop Price
          </h3>

          <div class="alert alert-light text-center border">
            Current Price: <strong class="text-success">₹ {{ crop.price }}</strong>
          </div>

          <form method="POST">
            <div class="mb-3">
              <label class="form-label fw-semibold">New Price (Min-Max per 100 kg)</label>
              <input type="text" 
                     class="form-control form-control-lg" 
                     name="price" 
                    
                     placeholder="Enter new crop price" 
                     required>
            </div>

            <div class="d-grid mb-3">
              <button type="submit" class="btn btn-success btn-lg">
                Update Price
              </button>
            </div>
          </form>

          <div class="text-center mt-2">
            <a href="{{ url_for('buyer_dashboard') }}" class="btn btn-outline-secondary">
              <i class="fa fa-arrow-left"></i> Back to Dashboard
            </a>
          </div>

        </div>
      </div>
    </div>
  </div>
</div>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
