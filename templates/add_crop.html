<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Add Crop Price</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            background: url("https://images.unsplash.com/photo-1500382017468-9049fed747ef?auto=format&fit=crop&w=1950&q=80") no-repeat center center fixed;
            background-size: cover;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .card-glass {
            background: rgba(255,255,255,0.15);
            backdrop-filter: blur(15px);
            border-radius: 15px;
            border: 1px solid rgba(255,255,255,0.2);
            box-shadow: 0 8px 25px rgba(0,0,0,0.4);
            padding: 30px;
            width: 100%;
            max-width: 500px;
            color: #fff;
        }

        h2 {
            text-align: center;
            margin-bottom: 25px;
            color: #fff;
        }

        .form-control {
            border-radius: 8px;
            margin-bottom: 15px;
            padding: 12px;
            font-size: 15px;
        }

        .btn-primary {
            width: 100%;
            padding: 12px;
            border-radius: 8px;
            font-weight: bold;
        }

        .back-link {
            display: block;
            text-align: center;
            margin-top: 20px;
        }

        .btn-secondary {
            text-decoration: none;
            color: #fff;
            background: #7f8c8d;
            padding: 10px 20px;
            border-radius: 8px;
        }

        .btn-secondary:hover {
            background: #636e72;
            text-decoration: none;
        }

        select:focus, input:focus {
            border-color: #27ae60;
            outline: none;
        }
    </style>
</head>

<body>

<div class="card-glass">

    <h2><i class="fa fa-chart-line"></i> Add Crop Price</h2>

    <form method="POST">
        <select name="crop_id" class="form-control" required>
            <option value="" disabled selected>Select Crop</option>
            {% for crop in crops %}
                <option value="{{ crop.id }}">{{ crop.crop_name }}</option>
            {% endfor %}
        </select>

        <input type="text" name="price" class="form-control" placeholder="Price (Min-Max) per 100 kg" required>

        <button type="submit" class="btn btn-success"><i class="fa fa-plus"></i> Add Crop Price</button>
    </form>

    <div class="back-link">
        <a href="{{ url_for('buyer_dashboard') }}" class="btn-secondary"><i class="fa fa-arrow-left"></i> Back to Dashboard</a>
    </div>

</div>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
