<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Place Order</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>

body{
    font-family: 'Segoe UI', sans-serif;
    background: url("https://images.unsplash.com/photo-1500382017468-9049fed747ef?auto=format&fit=crop&w=1950&q=80") no-repeat center center fixed;
    background-size: cover;
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
}

.order-card{
    background: rgba(255,255,255,0.92);
    border-radius:12px;
    padding:30px;
    width:100%;
    max-width:500px;
    box-shadow:0 10px 25px rgba(0,0,0,0.2);
}

.order-card h2{
    font-weight:600;
}

.order-info{
    font-size:16px;
    margin-bottom:8px;
}

.btn{
    border-radius:6px;
}

</style>

</head>

<body>

<div class="order-card">

<h2 class="text-center mb-4">
<i class="fa-solid fa-cart-shopping"></i> Place Order
</h2>

<div class="mb-3">

<p class="order-info"><b>👨‍🌾 Farmer:</b> {{ crop.farmer_name }}</p>
<p class="order-info"><b>🌾 Crop:</b> {{ crop.crop_name }}</p>
<p class="order-info"><b>💰 Price:</b> ₹{{ crop.selling_price }} / Quintal</p>

</div>

<form method="POST" action="{{ url_for('place_order') }}">

<input type="hidden" name="user_id" value="{{ user_id }}">
<input type="hidden" name="crop_id" value="{{ crop_id }}">

<div class="mb-3">

<label class="form-label">Order Quantity (Quintal)</label>

<input type="number" name="quantity" class="form-control" placeholder="Enter quantity" required>

</div>

<div class="d-flex justify-content-between">

<button class="btn btn-success">
<i class="fa-solid fa-check"></i> Confirm Order
</button>

<a href="{{ url_for('orders') }}" class="btn btn-secondary">
<i class="fa-solid fa-xmark"></i> Cancel
</a>

</div>

</form>

</div>

</body>
</html>
